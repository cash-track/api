name: deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy — leave blank to auto-resolve from git ref'
        type: string
        required: false
      post_deploy_cmds:
        description: 'Newline-separated commands to run inside the container before `up -d`'
        type: string
        default: 'php app.php migrate -s -n'

permissions:
  contents: read

jobs:
  deploy:
    uses: cash-track/.github/.github/workflows/deploy.yml@main
    with:
      service: api
      tag: ${{ inputs.tag }}
      post_deploy_cmds: ${{ inputs.post_deploy_cmds }}
    secrets: inherit
